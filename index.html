<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG & Siri | Lucky Draw & WhatsApp Share</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --siri-purple: #4b0082; --sg-pink: #d63384; --gold: #ffd700; --bg: #f8fafc; --whatsapp: #25D366; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; margin: 0; overflow-x: hidden; }
        
        /* UI Components */
        .nav { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--siri-purple); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; padding: 25px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-save { background: var(--siri-purple); color: white; }
        .btn-winner { background: linear-gradient(135deg, #d63384, #4b0082); color: #fff; font-size: 22px; border: 2px solid var(--gold); letter-spacing: 2px; }
        .btn-whatsapp { background: var(--whatsapp); color: white; margin-top: 10px; }
        
        /* 10-Second Shuffle Overlay */
        #winnerOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1e293b 0%, #000 100%); z-index: 9999; 
            justify-content: center; align-items: center; flex-direction: column;
        }

        .shuffle-name { color: var(--gold); font-size: 60px; font-weight: 900; text-shadow: 0 0 30px rgba(255, 215, 0, 0.6); min-height: 90px; text-transform: uppercase; text-align: center; }
        .shuffle-sub { color: white; font-size: 18px; margin-bottom: 20px; opacity: 0.8; letter-spacing: 4px; }

        /* Winner Coupon Style */
        .coupon-box {
            background: white; width: 95%; max-width: 450px; border-radius: 24px;
            text-align: center; border: 10px double var(--gold); position: relative;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .coupon-header { background: linear-gradient(to right, var(--siri-purple), var(--sg-pink)); color: white; padding: 25px; border-radius: 12px 12px 0 0; font-size: 26px; font-weight: bold; }
        .coupon-body { padding: 30px; }
        .coupon-detail { font-size: 20px; margin: 15px 0; border-bottom: 1px dashed #ddd; padding-bottom: 8px; }
        .coupon-label { color: #64748b; font-size: 11px; text-transform: uppercase; font-weight: 900; display: block; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f5f9; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div id="winnerOverlay">
    <div id="shuffleWrapper" style="text-align: center;">
        <div class="shuffle-sub" id="shuffleStatus">INITIALIZING...</div>
        <div id="shuffleName" class="shuffle-name">READY</div>
        <div id="timerDisplay" style="color:var(--gold); font-family: monospace; margin-top: 30px; font-size: 28px;">10.0s</div>
    </div>

    <div id="couponCard" class="coupon-box" style="display:none;">
        <div class="coupon-header">⭐ WINNER REVEALED ⭐</div>
        <div class="coupon-body">
            <div class="coupon-detail"><span class="coupon-label">Winner Name</span><strong id="wName" style="font-size: 28px; color: var(--siri-purple);">-</strong></div>
            <div class="coupon-detail"><span class="coupon-label">Mobile Number</span><strong id="wPhone">-</strong></div>
            <div class="coupon-detail"><span class="coupon-label">Bill Number</span><strong id="wBill">-</strong></div>
            <div class="coupon-detail"><span class="coupon-label">Bill Amount</span><strong id="wAmount" style="color: var(--sg-pink);">₹0</strong></div>
            <div class="coupon-detail"><span class="coupon-label">Store Location</span><strong id="wStore">-</strong></div>
            
            <button class="btn btn-whatsapp" onclick="shareToWhatsApp()">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
                SHARE TO WHATSAPP
            </button>
            <button class="btn btn-save" style="margin-top:10px; background: #333;" onclick="closeWinner()">DONE</button>
        </div>
    </div>
</div>

<div id="loginPage" style="display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--siri-purple);">
    <div class="card" style="width: 380px; text-align: center;">
        <h2>Admin Login</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn btn-save" onclick="doLogin()">Login</button>
    </div>
</div>

<div id="mainPage" style="display: none;">
    <div class="nav">
        <div style="font-weight: 900; font-size: 22px; color: var(--siri-purple);">SG & SIRI ADMIN</div>
        <div><span id="storeTag" style="font-weight: bold; margin-right:20px;"></span><button onclick="location.reload()">Logout</button></div>
    </div>

    <div class="container">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px;">
            <div class="card">
                <h3>📜 New Entry</h3>
                <input type="text" id="cName" placeholder="Customer Name">
                <input type="tel" id="cPhone" placeholder="Mobile Number">
                <input type="text" id="cBill" placeholder="Bill Number">
                <input type="number" id="cAmount" placeholder="Bill Amount">
                <button class="btn btn-save" id="saveBtn" onclick="saveToSheet()">Save Customer</button>
            </div>

            <div class="card" style="text-align: center; border: 3px solid var(--gold); background: #fffcf0;">
                <h3>🎡 Prize Draw</h3>
                <div id="adminControls" style="display:none; margin-bottom: 20px;">
                    <select id="drawFilter"></select>
                </div>
                <button class="btn btn-winner" onclick="startLongShuffle()">🎰 LUCKY DRAW</button>
            </div>
        </div>

        <div class="card">
            <h3>📊 Recent Database</h3>
            <div style="overflow-x:auto;">
                <table id="dataTable">
                    <thead><tr><th>Store</th><th>Customer</th><th>Bill #</th><th>Value</th><th>Date</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsv6F8oW_HxQh2wA1MDSsAk7ro-aGgeO4dkR0PziKsW_kHTw30kaUvKDYbVa2n3e1XOA/exec";
    
    const CREDENTIALS = {
        "admin_hq": "SG_SIRI_MASTER_2026",
        "sg_eluru": "SG@ELR2026", "sg_tanuku": "SG@TNK2026", "sg_tuni": "SG@TUNI2026",
        "sg_tenali": "SG@TEN2026", "sg_rajahmundry": "SG@RJY2026", "sg_vja": "SG@VJA2026",
        "sg_kakinada": "SG@KKD2026", "sg_tirupati": "SG@TPT2026", "sg_hyderabad": "SG@HYD2026",
        "sg_chilakaluripet": "SG@CPT2026",
        "siri_hyderabad": "SIRI@HYD2026", "siri_vja": "SIRI@VJA2026", "siri_kakinada": "SIRI@KKD2026",
        "siri_chilakaluripet": "SIRI@CPT2026", "siri_vizag": "SIRI@VZG2026", "siri_tirupati": "SIRI@TPT2026",
        "siri_rajahmundry": "SIRI@RJY2026", "siri_bhimavaram": "SIRI@BVM2026", "siri_eluru": "SIRI@ELR2026"
    };

    let loggedUser = "", latestData = [], currentWinner = null;

    function doLogin() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value.trim();
        if (CREDENTIALS[u] === p) {
            loggedUser = u;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            document.getElementById('storeTag').innerText = u.toUpperCase();
            if (u === "admin_hq") {
                const df = document.getElementById('drawFilter');
                df.innerHTML = `<option value="ALL">🌍 ALL STORES</option>`;
                Object.keys(CREDENTIALS).forEach(k => { if(k!=='admin_hq') df.innerHTML += `<option value="${k}">${k.toUpperCase()}</option>`; });
                document.getElementById('adminControls').style.display = 'block';
            }
            refreshEntries();
        } else { alert("Login Error!"); }
    }

    async function refreshEntries() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="5">Syncing...</td></tr>';
        const res = await fetch(SCRIPT_URL + "?action=getEntries");
        const data = await res.json();
        latestData = (loggedUser === 'admin_hq') ? data : data.filter(e => e.storeName === loggedUser);
        tbody.innerHTML = '';
        latestData.slice().reverse().forEach(e => {
            tbody.innerHTML += `<tr><td>${e.storeName.toUpperCase()}</td><td>${e.name}</td><td>${e.billNo}</td><td>₹${e.billValue}</td><td>${new Date(e.timestamp).toLocaleDateString()}</td></tr>`;
        });
    }

    async function saveToSheet() {
        const btn = document.getElementById('saveBtn'); btn.disabled = true;
        const params = new URLSearchParams({ storeName: loggedUser, customerName: document.getElementById('cName').value, phoneNumber: document.getElementById('cPhone').value, billNumber: document.getElementById('cBill').value, billValue: document.getElementById('cAmount').value });
        await fetch(SCRIPT_URL, { method: 'POST', body: params, mode: 'no-cors' });
        alert("Saved!"); btn.disabled = false; refreshEntries();
    }

    function startLongShuffle() {
        let pool = latestData;
        if(loggedUser === 'admin_hq') {
            const f = document.getElementById('drawFilter').value;
            if(f !== "ALL") pool = latestData.filter(e => e.storeName === f);
        }
        if (pool.length === 0) return alert("No data for draw!");

        const overlay = document.getElementById('winnerOverlay');
        const shuffleName = document.getElementById('shuffleName');
        const timerDisplay = document.getElementById('timerDisplay');
        const coupon = document.getElementById('couponCard');
        const wrapper = document.getElementById('shuffleWrapper');

        overlay.style.display = 'flex'; wrapper.style.display = 'block'; coupon.style.display = 'none';

        let timeLeft = 10.0;
        let shuffleSpeed = 70;

        const timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            timerDisplay.innerText = Math.max(0, timeLeft).toFixed(1) + "s";
            if(timeLeft <= 0) clearInterval(timerInterval);
        }, 100);

        const shuffleNames = () => {
            if(timeLeft <= 0) { revealFinalWinner(pool); return; }
            shuffleName.innerText = pool[Math.floor(Math.random() * pool.length)].name;
            if(timeLeft < 3) shuffleSpeed += 20;
            setTimeout(shuffleNames, shuffleSpeed);
        };
        shuffleNames();
    }

    function revealFinalWinner(pool) {
        currentWinner = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('shuffleWrapper').style.display = 'none';
        const card = document.getElementById('couponCard');
        card.style.display = 'block';
        
        document.getElementById('wName').innerText = currentWinner.name.toUpperCase();
        document.getElementById('wPhone').innerText = currentWinner.phone;
        document.getElementById('wBill').innerText = currentWinner.billNo;
        document.getElementById('wAmount').innerText = "₹" + currentWinner.billValue;
        document.getElementById('wStore').innerText = currentWinner.storeName.replace('_',' ').toUpperCase();

        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
    }

    function shareToWhatsApp() {
        if (!currentWinner) return;
        const msg = `🎊 *LUCKY DRAW WINNER!* 🎊%0A%0AWe are excited to announce the winner of the SG & SIRI Lucky Draw!%0A%0A⭐ *Winner Name:* ${currentWinner.name.toUpperCase()}%0A📱 *Phone:* ${currentWinner.phone}%0A🧾 *Bill No:* ${currentWinner.billNo}%0A💰 *Bill Amount:* ₹${currentWinner.billValue}%0A📍 *Store:* ${currentWinner.storeName.toUpperCase()}%0A%0ACongratulations to the winner! 🏆✨`;
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    function closeWinner() { document.getElementById('winnerOverlay').style.display = 'none'; currentWinner = null; }
</script>
</body>
</html>

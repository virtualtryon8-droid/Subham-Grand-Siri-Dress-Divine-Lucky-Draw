<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG & Siri | Master Admin Portal 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --siri-purple: #4b0082; --sg-pink: #d63384; --gold: #ffd700; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        .nav { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--siri-purple); position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; padding: 25px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        h3 { color: var(--siri-purple); margin-top: 0; border-left: 5px solid var(--sg-pink); padding-left: 15px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-save { background: var(--siri-purple); color: white; }
        .btn-winner { background: linear-gradient(135deg, var(--gold), #f59e0b); color: #000; border: 2px solid #b45309; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background: #f1f5f9; padding: 12px; text-align: left; font-size: 13px; color: #64748b; }
        td { padding: 14px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .sg-badge { background: #fdf2f8; color: var(--sg-pink); border: 1px solid #fbcfe8; }
        .siri-badge { background: #f5f3ff; color: var(--siri-purple); border: 1px solid #ddd6fe; }
        #searchBox { background: #fff; border: 2px solid var(--siri-purple); margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loginPage" style="display: flex; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #4b0082, #d63384);">
    <div class="card" style="width: 400px; text-align: center; border: none;">
        <h2 style="color: var(--siri-purple);">Portal Login</h2>
        <input type="text" id="user" placeholder="Enter Store Username">
        <input type="password" id="pass" placeholder="Enter Password">
        <button class="btn btn-save" onclick="doLogin()">Access System</button>
    </div>
</div>

<div id="mainPage" style="display: none;">
    <div class="nav">
        <div style="font-weight: bold; font-size: 20px; color: var(--siri-purple);">SG & SIRI</div>
        <div>
            <span id="storeTag" style="font-weight:bold; color: var(--siri-purple); margin-right: 20px;"></span>
            <button onclick="location.reload()" style="color:#ef4444; border:1px solid #ef4444; background:none; padding:8px 16px; border-radius:8px; cursor:pointer;">Logout</button>
        </div>
    </div>

    <div class="container">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px;">
            <div class="card">
                <h3>📜 New Entry</h3>
                <input type="text" id="cName" placeholder="Customer Name">
                <input type="tel" id="cPhone" placeholder="Mobile Number">
                <input type="text" id="cBill" placeholder="Bill Number">
                <input type="number" id="cAmount" placeholder="Bill Amount">
                <button class="btn btn-save" id="saveBtn" onclick="saveToSheet()">Save Entry</button>
            </div>

            <div class="card" style="border: 2px solid var(--gold);">
                <h3>🎡 Lucky Draw Center</h3>
                <div id="adminDrawControls" style="display:none;">
                    <select id="drawFilter"></select>
                </div>
                <p id="drawInfo" style="font-size: 13px; color: #64748b; margin: 15px 0;">Entries will be picked based on your access level.</p>
                <button class="btn btn-winner" onclick="pickWinner()">🚀 Run Live Draw</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                <h3>📊 <span id="tableTitle">Records</span></h3>
                <input type="text" id="searchBox" placeholder="🔍 Search Name or Phone..." style="width: 300px;" onkeyup="filterTable()">
                <button class="btn" style="width: auto; padding: 10px 20px; background: #eee; font-size: 12px;" onclick="refreshEntries()">Refresh List</button>
            </div>
            <div style="overflow-x:auto;">
                <table id="mainTable">
                    <thead>
                        <tr><th>Store</th><th>Customer</th><th>Phone</th><th>Bill #</th><th>Value</th><th>Date</th></tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsv6F8oW_HxQh2wA1MDSsAk7ro-aGgeO4dkR0PziKsW_kHTw30kaUvKDYbVa2n3e1XOA/exec";
    
    const CREDENTIALS = {
        "admin_hq": "SG_SIRI_MASTER_2026",
        "sg_eluru": "SG@ELR2026", "sg_tanuku": "SG@TNK2026", "sg_tuni": "SG@TUNI2026",
        "sg_tenali": "SG@TEN2026", "sg_rajahmundry": "SG@RJY2026", "sg_vja": "SG@VJA2026",
        "sg_kakinada": "SG@KKD2026", "sg_tirupati": "SG@TPT2026", "sg_hyderabad": "SG@HYD2026",
        "sg_chilakaluripet": "SG@CPT2026",
        "siri_hyderabad": "SIRI@HYD2026", "siri_vja": "SIRI@VJA2026", "siri_kakinada": "SIRI@KKD2026",
        "siri_chilakaluripet": "SIRI@CPT2026", "siri_vizag": "SIRI@VZG2026", "siri_tirupati": "SIRI@TPT2026",
        "siri_rajahmundry": "SIRI@RJY2026", "siri_bhimavaram": "SIRI@BVM2026", "siri_eluru": "SIRI@ELR2026"
    };

    let loggedUser = "", latestData = [];

    function doLogin() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value.trim();
        if (CREDENTIALS[u] === p) {
            loggedUser = u;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            
            const isMaster = (u === 'admin_hq');
            document.getElementById('storeTag').innerText = isMaster ? "👑 MASTER ADMIN" : "📍 " + u.toUpperCase();
            document.getElementById('tableTitle').innerText = isMaster ? "ALL STORE RECORDS" : "YOUR STORE RECORDS";

            if (isMaster) {
                const filter = document.getElementById('drawFilter');
                filter.innerHTML = `<option value="ALL">🌍 ALL STORES (GLOBAL DRAW)</option>`;
                Object.keys(CREDENTIALS).forEach(key => {
                    if(key !== 'admin_hq') filter.innerHTML += `<option value="${key}">${key.toUpperCase()}</option>`;
                });
                document.getElementById('adminDrawControls').style.display = "block";
            }
            refreshEntries();
        } else { alert("Login Failed!"); }
    }

    async function refreshEntries() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="6">Loading Data...</td></tr>';
        try {
            const res = await fetch(SCRIPT_URL + "?action=getEntries");
            const rawData = await res.json();
            
            // Logic: Filter data for stores, show all for admin_hq
            latestData = (loggedUser === 'admin_hq') ? rawData : rawData.filter(e => e.storeName === loggedUser);
            
            tbody.innerHTML = '';
            latestData.slice().reverse().forEach(e => {
                const bType = e.storeName.startsWith('sg') ? 'sg-badge' : 'siri-badge';
                tbody.innerHTML += `<tr>
                    <td><span class="badge ${bType}">${e.storeName.toUpperCase()}</span></td>
                    <td>${e.name}</td><td>${e.phone || '-'}</td><td>${e.billNo}</td><td>₹${e.billValue}</td>
                    <td>${new Date(e.timestamp).toLocaleDateString()}</td>
                </tr>`;
            });
        } catch (e) { tbody.innerHTML = '<tr><td colspan="6">Error loading data.</td></tr>'; }
    }

    async function saveToSheet() {
        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerText = "Saving...";
        const params = new URLSearchParams({ 
            storeName: loggedUser, customerName: document.getElementById('cName').value, 
            phoneNumber: document.getElementById('cPhone').value, 
            billNumber: document.getElementById('cBill').value, 
            billValue: document.getElementById('cAmount').value 
        });
        await fetch(SCRIPT_URL, { method: 'POST', body: params, mode: 'no-cors' });
        alert("Saved!");
        document.querySelectorAll('input:not(#searchBox)').forEach(i => i.value = '');
        btn.disabled = false; btn.innerText = "Save Entry";
        refreshEntries();
    }

    function filterTable() {
        const q = document.getElementById('searchBox').value.toLowerCase();
        const rows = document.getElementById('tableBody').getElementsByTagName('tr');
        for (let row of rows) {
            row.style.display = row.innerText.toLowerCase().includes(q) ? "" : "none";
        }
    }

    function pickWinner() {
        let pool = latestData;
        if (loggedUser === 'admin_hq') {
            const scope = document.getElementById('drawFilter').value;
            if(scope !== "ALL") pool = latestData.filter(e => e.storeName === scope);
        }
        
        if (pool.length === 0) return alert("No entries found!");
        const winner = pool[Math.floor(Math.random() * pool.length)];
        confetti({ particleCount: 200, spread: 70 });
        alert(`🏆 WINNER: ${winner.name.toUpperCase()}\nStore: ${winner.storeName.toUpperCase()}\nBill: ${winner.billNo}`);
    }
</script>
</body>
</html>

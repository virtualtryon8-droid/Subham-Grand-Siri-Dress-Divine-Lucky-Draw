<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG & Siri | Master Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --siri-purple: #4b0082;
            --sg-pink: #d63384;
            --prestige-gold: #ffd700;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; overflow-x: hidden; }

        /* Branding - Extra Large Visibility */
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 40px; margin: 25px 0; }
        .logo-container img { height: 95px; width: auto; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        
        .nav { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-bottom: 4px solid var(--siri-purple); position: sticky; top: 0; z-index: 100; }
        .nav-logos img { height: 65px; margin-right: 15px; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; padding: 35px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eef; }

        h3 { color: var(--siri-purple); border-left: 5px solid var(--sg-pink); padding-left: 15px; margin-bottom: 25px; }
        input, select { width: 100%; padding: 16px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; text-transform: uppercase; transition: 0.3s; }
        .btn-save { background: var(--siri-purple); color: white; }
        .btn-winner { background: linear-gradient(45deg, var(--sg-pink), #ff007f); color: white; }
        .btn-download { background: #1D6F42; color: white; margin-top: 10px; font-size: 14px; padding: 12px; }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }

        /* Shuffle Overlay */
        #shuffleOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #shufflingName { font-size: 60px; font-weight: 900; margin: 20px; color: var(--prestige-gold); text-align: center; }

        /* Winner Coupon Reveal */
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.94); z-index:3000; align-items:center; justify-content:center; }
        .coupon { background: white; width: 450px; padding: 40px; border-radius: 35px; text-align: center; border: 10px double var(--prestige-gold); transform: scale(0.5); opacity: 0; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .coupon.show { transform: scale(1); opacity: 1; }
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 17px; }
    </style>
</head>
<body>

<div id="shuffleOverlay">
    <div id="shuffleTitle" style="letter-spacing: 8px; color: var(--sg-pink); font-size: 16px; margin-bottom: 20px;">SCANNING DATA</div>
    <div id="shufflingName">---</div>
    <div id="shufflingLoc" style="opacity: 0.6; font-size: 20px;"></div>
</div>

<div id="loginPage" style="display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="card" style="width: 480px; text-align: center; border-bottom: 10px solid var(--siri-purple);">
        <div class="logo-container">
            <img src="logo1.jpg" alt="Subham Grand">
            <img src="logo2.png" alt="Siri Dress Divine">
        </div>
        <h2 style="color: var(--siri-purple);">Secure Entry Portal</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn btn-save" onclick="doLogin()">AUTHENTICATE</button>
    </div>
</div>

<div id="mainPage" style="display: none;">
    <div class="nav">
        <div class="nav-logos"><img src="logo1.jpg"><img src="logo2.png"></div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <span id="storeTag" style="font-weight:900; color:var(--siri-purple); font-size: 18px;"></span>
            <button onclick="location.reload()" style="background:none; border:1px solid red; color:red; padding:5px 10px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>
    </div>

    <div class="container">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 30px;">
            
            <div class="card">
                <h3>📜 Today's Entry</h3>
                <input type="text" id="cName" placeholder="Customer Name">
                <input type="tel" id="cPhone" placeholder="Mobile Number">
                <input type="text" id="cBill" placeholder="Bill Number">
                <input type="number" id="cAmount" placeholder="Bill Value (Min ₹2999)">
                <button class="btn btn-save" onclick="saveToSheet()">SAVE DATA</button>
            </div>

            <div class="card" style="border: 4px solid var(--sg-pink); text-align: center;">
                <h3 style="color: var(--sg-pink);">🎡 Lucky Draw Center</h3>
                
                <div id="adminControls" style="display: none; background: #fff5f8; padding: 15px; border-radius: 15px; margin-bottom: 15px;">
                    <div style="font-weight: bold; margin-bottom: 10px; color: var(--siri-purple);">ADMIN TOOLS</div>
                    <select id="dateMode" onchange="refreshEntries()">
                        <option value="today">Today's Entries</option>
                        <option value="all">All Dates History</option>
                    </select>
                    <select id="drawScope" style="margin-top: 10px;">
                        <option value="all">All Stores Combined</option>
                        <option value="sg_eluru">Subham Grand - Eluru</option>
                        <option value="sg_tanuku">Subham Grand - Tanuku</option>
                        <option value="sg_vja">Subham Grand - Vijayawada</option>
                        <option value="siri_hyd">Siri Divine - Hyderabad</option>
                    </select>
                    <button class="btn btn-download" onclick="downloadExcelReport()">📊 DOWNLOAD EXCEL REPORT</button>
                </div>

                <div id="storeViewOnly" style="font-weight: bold; color: var(--sg-pink); margin: 15px 0;">
                    MODE: TODAY'S LOCAL DRAW
                </div>

                <button class="btn btn-winner" onclick="pickWinnerWithShuffle()">🚀 RUN DRAW BLAST</button>
            </div>
        </div>

        <div class="card" id="entriesCard" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 id="tableTitle">📊 Entries</h3>
                <button onclick="refreshEntries()" style="background:var(--siri-purple); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">Refresh</button>
            </div>
            <div style="overflow-x:auto; margin-top:15px;">
                <table id="dataTable" style="width:100%; border-collapse: collapse; font-size: 14px;">
                    <thead style="background:#f4f4f4;"><tr><th>Store</th><th>Customer</th><th>Bill #</th><th>Value</th><th>Date</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="winnerOverlay" class="overlay">
    <div class="coupon" id="winnerCoupon">
        <h1>🎊 CONGRATULATIONS 🎊</h1>
        <div id="winnerFinalInfo" style="text-align: left; background: #fff8fb; padding: 20px; border-radius: 20px; border: 1px solid #ffeef5;"></div>
        <p style="font-size: 11px; color: #999; margin-top: 20px;">* T&C Apply. Original Bill Required.</p>
        <button class="btn" style="background:#25D366; color:white; margin-top: 15px;" onclick="waNotify()">📲 WHATSAPP WINNER</button>
        <button onclick="closeWinner()" style="margin-top:15px; background:none; border:none; color:#bbb; cursor:pointer; text-decoration:underline;">Close</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsv6F8oW_HxQh2wA1MDSsAk7ro-aGgeO4dkR0PziKsW_kHTw30kaUvKDYbVa2n3e1XOA/exec";
    
    const CREDENTIALS = {
        "sg_eluru": "SG@2026!ELR", "sg_tanuku": "SG@2026!TNK", "sg_tuni": "SG@2026!TNI",
        "sg_tenali": "SG@2026!TNL", "sg_rjy": "SG@2026!RJY", "sg_vja": "SG@2026!VJA",
        "sg_kkd": "SG@2026!KKD", "sg_tpt": "SG@2026!TPT", "sg_hyd": "SG@2026!HYD", "sg_cpt": "SG@2026!CPT",
        "siri_hyd": "SIRI@2026!HYD", "siri_vja": "SIRI@2026!VJA", "siri_kkd": "SIRI@2026!KKD",
        "siri_cpt": "SIRI@2026!CPT", "siri_vzg": "SIRI@2026!VZG", "siri_tpt": "SIRI@2026!TPT",
        "siri_rjy": "SIRI@2026!RJY", "siri_bvm": "SIRI@2026!BVM", "siri_elr": "SIRI@2026!ELR",
        "admin_hq": "SG_SIRI_MASTER_2026"
    };

    let loggedUser = "";
    let isMasterAdmin = false;
    let currentWinner = null;
    let latestData = [];

    function doLogin() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value.trim();
        if (CREDENTIALS[u] === p) {
            loggedUser = u;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            if (u === "admin_hq") {
                isMasterAdmin = true;
                document.getElementById('storeTag').innerText = "👑 ADMIN HQ";
                document.getElementById('adminControls').style.display = "block";
                document.getElementById('storeViewOnly').style.display = "none";
                document.getElementById('entriesCard').style.display = "block";
                refreshEntries();
            } else {
                document.getElementById('storeTag').innerText = "📍 " + u.toUpperCase();
            }
        } else { alert("Login Failed"); }
    }

    function isFromToday(dateString) {
        if(!dateString) return true;
        return new Date(dateString).toDateString() === new Date().toDateString();
    }

    async function pickWinnerWithShuffle() {
        const res = await fetch(SCRIPT_URL + "?action=getEntries");
        const all = await res.json();
        const mode = isMasterAdmin ? document.getElementById('dateMode').value : 'today';
        const poolBasis = mode === 'today' ? all.filter(e => isFromToday(e.timestamp)) : all;
        
        let pool = isMasterAdmin && document.getElementById('drawScope').value !== 'all' 
                   ? poolBasis.filter(e => e.storeName === document.getElementById('drawScope').value) 
                   : (isMasterAdmin ? poolBasis : poolBasis.filter(e => e.storeName === loggedUser));

        if (pool.length < 1) { alert("NO ENTRIES FOUND!"); return; }

        document.getElementById('shuffleOverlay').style.display = 'flex';
        let counter = 0;
        let shuffleInterval = setInterval(() => {
            let rand = pool[Math.floor(Math.random() * pool.length)];
            document.getElementById('shufflingName').innerText = rand.name.toUpperCase();
            document.getElementById('shufflingLoc').innerText = rand.storeName.toUpperCase();
            if (++counter > 50) { clearInterval(shuffleInterval); finishDraw(pool); }
        }, 50);
    }

    function finishDraw(pool) {
        currentWinner = pool[Math.floor(Math.random() * pool.length)];
        document.getElementById('shuffleOverlay').style.display = 'none';
        document.getElementById('winnerFinalInfo').innerHTML = `
            <div class="detail-row"><span>NAME:</span><b>${currentWinner.name}</b></div>
            <div class="detail-row"><span>MOBILE:</span><b>${currentWinner.phone}</b></div>
            <div class="detail-row"><span>BILL #:</span><b>${currentWinner.billNo}</b></div>
            <div class="detail-row"><span>VALUE:</span><b>₹${currentWinner.billValue}</b></div>
            <div class="detail-row"><span>STORE:</span><b>${currentWinner.storeName.toUpperCase()}</b></div>
        `;
        document.getElementById('winnerOverlay').style.display = 'flex';
        setTimeout(() => { document.getElementById('winnerCoupon').classList.add('show'); }, 50);
        confetti({ particleCount: 400, spread: 150, colors: ['#4b0082', '#d63384', '#ffd700'] });
    }

    async function saveToSheet() {
        const params = new URLSearchParams({
            storeName: loggedUser, customerName: document.getElementById('cName').value,
            phoneNumber: document.getElementById('cPhone').value, billNumber: document.getElementById('cBill').value,
            billValue: document.getElementById('cAmount').value
        });
        await fetch(SCRIPT_URL, { method: 'POST', body: params });
        alert("Entry Saved!");
        refreshEntries();
    }

    async function refreshEntries() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '<tr><td colspan="5">Loading Cloud Data...</td></tr>';
        const res = await fetch(SCRIPT_URL + "?action=getEntries");
        latestData = await res.json();
        
        const mode = isMasterAdmin ? document.getElementById('dateMode').value : 'today';
        const filtered = mode === 'today' ? latestData.filter(e => isFromToday(e.timestamp)) : latestData;
        
        tbody.innerHTML = '';
        filtered.reverse().forEach(e => {
            tbody.innerHTML += `<tr><td>${e.storeName.toUpperCase()}</td><td>${e.name}</td><td>${e.billNo}</td><td>₹${e.billValue}</td><td>${new Date(e.timestamp).toLocaleDateString()}</td></tr>`;
        });
    }

    // --- NEW EXCEL DOWNLOAD LOGIC ---
    function downloadExcelReport() {
        const mode = document.getElementById('dateMode').value;
        const filtered = mode === 'today' ? latestData.filter(e => isFromToday(e.timestamp)) : latestData;
        
        let csvContent = "data:text/csv;charset=utf-8,Store,Customer Name,Phone,Bill No,Bill Value,Date\n";
        filtered.forEach(e => {
            const row = `${e.storeName},${e.name},${e.phone},${e.billNo},${e.billValue},${new Date(e.timestamp).toLocaleDateString()}`;
            csvContent += row + "\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `SG_Siri_Report_${mode}_${new Date().toLocaleDateString()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function closeWinner() { document.getElementById('winnerOverlay').style.display = 'none'; document.getElementById('winnerCoupon').classList.remove('show'); }
    function waNotify() {
        window.open(`https://api.whatsapp.com/send?phone=91${currentWinner.phone}&text=Congratulations ${currentWinner.name}! You won the Draw!`);
    }
</script>
</body>
</html>
